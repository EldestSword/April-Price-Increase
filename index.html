<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>April 2026 Bill Increase Explainer</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #1d4ed8;
      --error: #b91c1c;
      --error-bg: #fef2f2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    header {
      max-width: 980px;
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0;
    }

    .source-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1rem 1rem;
      display: grid;
      gap: 1rem;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      padding: 1rem;
    }

    h2 { margin: 0 0 0.75rem; font-size: 1.1rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 0.45rem;
      text-align: left;
      vertical-align: top;
    }

    th { background: #f3f4f6; }

    input, select, button {
      font: inherit;
    }

    input[type="text"], input[type="number"], select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.42rem;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.7rem;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .error {
      font-size: 0.78rem;
      margin-top: 0.2rem;
      color: var(--error);
      display: none;
    }

    .invalid {
      border-color: var(--error) !important;
      background: var(--error-bg);
    }

    .totals {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 0.5rem;
      margin-top: 0.9rem;
    }

    .total-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem;
      background: #fafafa;
    }

    #rowSummary {
      margin: 0.8rem 0 0;
      padding-left: 1rem;
      font-size: 0.88rem;
    }

    #rowSummary li {
      margin-bottom: 0.25rem;
    }

    footer {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1rem 1.25rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .toast {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      background: #111827;
      color: #fff;
      padding: 0.45rem 0.65rem;
      border-radius: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      font-size: 0.82rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 860px) {
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>April 2026 Bill Increase Explainer</h1>
    <a class="source-link" href="https://xlngroup.sharepoint.com/sites/Lighthouse/SitePages/Initiatives%20%26%20Acquisitions/Price%20Increases/Price%20Increase%20April%202026.aspx" target="_blank" rel="noopener noreferrer">Lighthouse (source)</a>
  </header>

  <main>
    <section class="panel">
      <h2>Add services</h2>
      <table>
        <thead>
          <tr>
            <th>Service type</th>
            <th>Description</th>
            <th>Current monthly charge (£)</th>
            <th>Quantity</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="serviceRows"></tbody>
      </table>
      <div class="toolbar">
        <button id="addRowBtn" type="button" class="primary">Add row</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </section>

    <section class="panel">
      <h2>Result</h2>
      <div class="totals">
        <div class="total-box"><strong>Total before</strong><div id="totalBefore">£0.00</div></div>
        <div class="total-box"><strong>Total after</strong><div id="totalAfter">£0.00</div></div>
        <div class="total-box"><strong>Difference</strong><div id="totalDiff">£0.00</div></div>
      </div>
      <ul id="rowSummary"></ul>
      <div class="toolbar">
        <button id="copyExplanationBtn" type="button">Copy explanation</button>
      </div>
    </section>
  </main>

  <footer>
    Estimation tool. Confirm final charges in Lighthouse/Daisy Central.
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite">Copied</div>

  <script>
    const SERVICE_TYPES = [
      { id: 'wlr', label: 'WLR Line (Single/Multi) – line only (+£12.50)', kind: 'flat' },
      { id: 'isdn', label: 'ISDN2 / ISDN30 – per line (+£12.50)', kind: 'flat' },
      { id: 'maintenance', label: 'Maintenance (+20%)', kind: 'percent', numerator: 1200 },
      { id: 'hosting', label: 'Data Hosting (Co-Location / Rack Space) (+25%)', kind: 'percent', numerator: 1250 },
      { id: 'leased', label: 'Leased Line connectivity (+10%)', kind: 'percent', numerator: 1100 },
      { id: 'other', label: 'Broadband / Voice / Mobile / Other (base +6.9%)', kind: 'percent', numerator: 1069 }
    ];

    const rowsEl = document.getElementById('serviceRows');
    const totalBeforeEl = document.getElementById('totalBefore');
    const totalAfterEl = document.getElementById('totalAfter');
    const totalDiffEl = document.getElementById('totalDiff');
    const rowSummaryEl = document.getElementById('rowSummary');
    const toastEl = document.getElementById('toast');

    function poundsToPence(str) {
      const cleaned = (str || '').toString().replace(/£|,/g, '').trim();
      if (!cleaned) return null;
      if (!/^\d+(\.\d{0,2})?$/.test(cleaned)) return null;
      const [whole, frac = ''] = cleaned.split('.');
      const pennies = parseInt((frac + '00').slice(0, 2), 10);
      return (parseInt(whole, 10) * 100) + pennies;
    }

    function formatGBP(penceInt) {
      const sign = penceInt < 0 ? '-' : '';
      const abs = Math.abs(penceInt);
      const pounds = Math.floor(abs / 100);
      const pence = String(abs % 100).padStart(2, '0');
      return `${sign}£${pounds}.${pence}`;
    }

    function applyRule(oldPence, serviceTypeId) {
      const service = SERVICE_TYPES.find((s) => s.id === serviceTypeId);
      if (!service) return oldPence;
      if (service.kind === 'flat') return oldPence + 1250;
      return Math.round(oldPence * service.numerator / 1000);
    }

    function createServiceOptions() {
      return SERVICE_TYPES.map((s) => `<option value="${s.id}">${s.label}</option>`).join('');
    }

    function addRow() {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><select class="serviceType" required>${createServiceOptions()}</select></td>
        <td><input class="description" type="text" placeholder="Optional" /></td>
        <td>
          <input class="price" type="text" inputmode="decimal" placeholder="0.00" />
          <div class="error">Enter a price</div>
        </td>
        <td><input class="qty" type="number" min="1" step="1" value="1" /></td>
        <td><button type="button" class="removeBtn">Remove</button></td>
      `;
      rowsEl.appendChild(tr);
    }

    function recalc() {
      const rowEls = Array.from(rowsEl.querySelectorAll('tr'));
      let totalBefore = 0;
      let totalAfter = 0;
      const summaryItems = [];

      rowEls.forEach((row) => {
        const serviceId = row.querySelector('.serviceType').value;
        const label = SERVICE_TYPES.find((s) => s.id === serviceId)?.label || 'Service';
        const description = row.querySelector('.description').value.trim();
        const priceInput = row.querySelector('.price');
        const qtyInput = row.querySelector('.qty');
        const errorEl = row.querySelector('.error');

        const unitPence = poundsToPence(priceInput.value);
        const qty = Math.max(1, parseInt(qtyInput.value, 10) || 1);
        qtyInput.value = qty;

        if (unitPence === null) {
          priceInput.classList.add('invalid');
          errorEl.style.display = 'block';
          return;
        }

        priceInput.classList.remove('invalid');
        errorEl.style.display = 'none';

        const newUnitPence = applyRule(unitPence, serviceId);
        const before = unitPence * qty;
        const after = newUnitPence * qty;
        const diff = after - before;

        totalBefore += before;
        totalAfter += after;

        const shortLabel = description ? `${label} (${description})` : label;
        summaryItems.push(`<li>${shortLabel}: ${formatGBP(before)} → ${formatGBP(after)} (Δ ${formatGBP(diff)})</li>`);
      });

      totalBeforeEl.textContent = formatGBP(totalBefore);
      totalAfterEl.textContent = formatGBP(totalAfter);
      totalDiffEl.textContent = formatGBP(totalAfter - totalBefore);
      rowSummaryEl.innerHTML = summaryItems.join('');

      return { totalBefore, totalAfter, diff: totalAfter - totalBefore };
    }

    function buildExplanationText(totals) {
      return `From April 2026 your monthly charges will change from ${formatGBP(totals.totalBefore)} to ${formatGBP(totals.totalAfter)} (an increase of ${formatGBP(totals.diff)}). Individual services may increase by either +£12.50 per line or by a percentage uplift (typically 6.9%), depending on the service.`;
    }

    function showToast() {
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 1200);
    }

    document.getElementById('addRowBtn').addEventListener('click', () => {
      addRow();
      recalc();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      rowsEl.innerHTML = '';
      addRow();
      recalc();
    });

    document.getElementById('copyExplanationBtn').addEventListener('click', async () => {
      const totals = recalc();
      const text = buildExplanationText(totals);
      try {
        await navigator.clipboard.writeText(text);
        showToast();
      } catch (_err) {
        const fallback = document.createElement('textarea');
        fallback.value = text;
        document.body.appendChild(fallback);
        fallback.select();
        document.execCommand('copy');
        fallback.remove();
        showToast();
      }
    });

    rowsEl.addEventListener('input', (event) => {
      if (event.target.closest('tr')) recalc();
    });

    rowsEl.addEventListener('change', (event) => {
      if (event.target.closest('tr')) recalc();
    });

    rowsEl.addEventListener('click', (event) => {
      if (!event.target.classList.contains('removeBtn')) return;
      const tr = event.target.closest('tr');
      if (tr) tr.remove();
      if (!rowsEl.querySelector('tr')) addRow();
      recalc();
    });

    addRow();
    recalc();
  </script>
</body>
</html>
